<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
          "colors": {
            "primary": "#2D6A4F",
            "background": "#F8F9F5",
            "surface": "#F8F9F5",
            "on-surface": "#2D3142",
            "on-background": "#2D3142",
            "primary-container": "#2D6A4F",
            "on-primary-container": "#F8F9F5",
            "secondary": "#D9ED92",
            "on-secondary": "#1B4332",
            "outline": "#2D3142",
            "surface-container": "#F1F2ED",
            "tertiary": "#2D3142"
          },
          "borderRadius": {
            "DEFAULT": "0.5rem",
            "lg": "0.75rem",
            "xl": "1rem",
            "full": "9999px"
          },
          "spacing": {
            "section-gap": "80px",
            "margin-mobile": "16px",
            "gutter": "24px",
            "container-max": "1280px",
            "unit": "8px",
            "margin-desktop": "40px"
          },
          "fontFamily": {
            "headline-lg": ["Montserrat", "Inter", "sans-serif"],
            "label-md": ["Montserrat", "Inter", "sans-serif"],
            "body-md": ["Poppins", "Inter", "sans-serif"],
            "body-lg": ["Poppins", "Inter", "sans-serif"],
            "headline-md": ["Montserrat", "Inter", "sans-serif"],
            "label-sm": ["Poppins", "Inter", "sans-serif"],
            "display-lg": ["Montserrat", "Inter", "sans-serif"]
          },
          "fontSize": {
            "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
            "label-md": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600" }],
            "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
            "label-sm": ["12px", { "lineHeight": "1.0", "fontWeight": "500" }],
            "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
          }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .premium-shadow:hover {
            box-shadow: 0px 12px 32px rgba(1, 68, 33, 0.04);
        }
        body {
            background-color: #fcf9f8;
            color: #1b1c1c;
        }
        /* === Sabores del Sur ANIMATION SYSTEM === */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(1, 68, 33, 0.15); } 50% { box-shadow: 0 0 20px 4px rgba(1, 68, 33, 0.08); } }
        .animate-on-scroll { opacity: 0; transform: translateY(40px); transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        .animate-on-scroll.is-visible { opacity: 1; transform: translateY(0); }
        .stagger-children > *:nth-child(1) { transition-delay: 0ms; }
        .stagger-children > *:nth-child(2) { transition-delay: 100ms; }
        .stagger-children > *:nth-child(3) { transition-delay: 200ms; }
        .stagger-children > *:nth-child(4) { transition-delay: 300ms; }
        .card-lift { transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease; }
        .card-lift:hover { transform: translateY(-8px); box-shadow: 0px 20px 40px rgba(45, 106, 79, 0.1); }
        .logo-float { animation: floatLogo 4s ease-in-out infinite; }
        .hero-entrance { animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both; }

        .card-premium {
            background: white;
            border-radius: 12px !important;
            border: 1px solid rgba(45, 106, 79, 0.05);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .card-premium:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(45, 106, 79, 0.1);
        }

        .btn-outline-premium {
            background-color: white !important;
            color: #2D6A4F !important;
            border: 2px solid #2D6A4F !important;
            border-radius: 12px !important;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-outline-premium:hover {
            background-color: #2D6A4F !important;
            color: white !important;
            box-shadow: 0 8px 16px rgba(45, 106, 79, 0.2);
        }

        .btn-solid-premium {
            background-color: #2D6A4F !important;
            color: white !important;
            border-radius: 12px !important;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.15);
        }

        .btn-solid-premium:hover {
            background-color: #1B4332 !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(45, 106, 79, 0.25);
        }

        body { background-color: #F8F9F5 !important; color: #2D3142 !important; font-family: 'Poppins', sans-serif; }
        
        nav.app-nav {
            position: fixed !important;
            top: 1.5rem !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 95% !important;
            max-width: 1200px !important;
            background-color: rgba(248, 249, 245, 0.95) !important;
            backdrop-filter: blur(12px) !important;
            border-radius: 16px !important;
            border: 1px solid rgba(45, 106, 79, 0.1) !important;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08) !important;
            height: 72px !important;
            padding: 0 2rem !important;
            z-index: 1000 !important;
        }

        h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #2D6A4F !important; }
        
        .material-symbols-outlined { color: #2D6A4F !important; }
        header .material-symbols-outlined, nav .material-symbols-outlined { color: #2D6A4F !important; }
        header .material-symbols-outlined:hover, nav .material-symbols-outlined:hover { color: #1B4332 !important; }
        
        header img[alt="Sabores del Sur Logo"], nav img[alt="Sabores del Sur Logo"] {
            object-fit: contain;
            border-radius: 10px;
            padding: 4px;
            opacity: 0.94;
        }
        header a, nav a { color: #2D3142 !important; font-weight: 600; font-family: 'Poppins', sans-serif; }
        header a:hover, nav a:hover { color: #2D6A4F !important; }
        nav a[href*="inventario.html"], header a[href*="inventario.html"] {
            background-color: #2D6A4F !important;
            color: white !important;
            padding: 0.6rem 1.2rem !important;
            border-radius: 12px !important;
            border: none !important;
        }
        footer { background-color: #F1F2ED !important; color: #2D3142 !important; }
        footer a { color: #2D3142 !important; opacity: 0.8; }
        footer a:hover { color: #2D6A4F !important; opacity: 1; }
        footer p { color: #2D3142 !important; opacity: 0.6; }

        /* === MOBILE OPTIMIZATION === */
        @media (max-width: 767px) {
            .px-8, .px-6, .px-4 { padding-left: 15px !important; padding-right: 15px !important; width: 100% !important; box-sizing: border-box !important; }
            .font-display-lg { font-size: calc(48px * 0.85) !important; }
            .font-headline-lg { font-size: calc(32px * 0.85) !important; }
            .font-headline-md { font-size: calc(24px * 0.85) !important; }
            .grid { grid-template-columns: 1fr !important; }
            .md\:flex-row { flex-direction: column !important; }
            header, nav { position: sticky !important; top: 0 !important; z-index: 50 !important; }
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface">
<!-- TopAppBar -->
<header class="bg-[#F8F9F5] dark:bg-zinc-950 border-b border-[#1B4332]/10 dark:border-white/10 sticky top-0 z-50 shadow-none">
<nav class="app-nav flex justify-between items-center px-8 h-20 max-w-7xl mx-auto backdrop-blur-md font-['Inter'] antialiased">
<div class="flex items-center gap-12">
<a href="{{ url_for('index') }}"><img src="{{ url_for('static', filename='Sabores del sur logo.jpeg') }}" alt="Sabores del Sur Logo" class="h-12 w-auto hover:scale-105 transition-transform duration-300 cursor-pointer drop-shadow-md logo-float"></a>
<div class="hidden md:flex items-center gap-8">
<a class="text-slate-600 dark:text-slate-400 font-medium hover:text-black transition-colors duration-200" href="{{ url_for('index') }}">Inicio</a>
<a class="text-black font-semibold border-b-2 border-black pb-1" href="{{ url_for('catalogo') }}">Productos</a>
<a class="text-slate-600 dark:text-slate-400 font-medium hover:text-black transition-colors duration-200" href="{{ url_for('recetas') }}">Recetas IA</a>
<a class="text-slate-600 dark:text-slate-400 font-medium hover:text-black transition-colors duration-200" href="{{ url_for('cuenta') }}">Mi cuenta</a>
</div>
</div>
<div class="flex items-center gap-6">
<a href="{{ url_for('inventario_page') }}" class="hidden md:flex items-center gap-1.5 px-3 py-1.5 bg-black text-white rounded-full font-medium text-[13px] hover:bg-zinc-800 transition-colors shadow-sm">
<span class="material-symbols-outlined text-[16px] text-white">inventory_2</span>Inventario</a>
<a id="cartButton" href="{{ url_for('carrito_page') }}" class="relative inline-flex items-center justify-center text-black hover:opacity-80 transition-opacity">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span id="cartCount" class="absolute -top-2 -right-2 inline-flex h-5 min-w-[20px] items-center justify-center rounded-full bg-primary text-white text-[11px] font-semibold">0</span>
          </a>
          <button class="material-symbols-outlined text-black hover:opacity-80 transition-opacity">person</button>
</div>
</nav>
<button class="p-2 text-on-surface-variant hover:bg-zinc-100/50 dark:hover:bg-white/5 transition-all rounded-full scale-95 active:scale-100">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</div>
</header>
<main class="max-w-7xl mx-auto px-6 md:px-margin-desktop">
<!-- Hero Section -->
<section class="mt-margin-desktop mb-section-gap">
<h1 class="font-headline-lg text-display-lg text-primary mb-2">Pasillo Digital</h1>
<p class="font-body-lg text-on-surface-variant max-w-2xl">Selección fresca y de calidad, directo a tu hogar.</p>
</section>
<!-- Product Grid Dinámico -->
<section class="mb-section-gap pb-20">
<div class="flex items-center justify-between mb-gutter">
<h2 class="font-headline-md text-headline-md text-primary">Productos</h2>
<p id="productosStatus" class="font-label-sm text-slate-500">Cargando productos desde la base de datos...</p>
</div>
<div id="productosGrid" class="space-y-10"></div>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<div class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-t border-zinc-200 dark:border-zinc-800 shadow-[0_-4px_20px_rgba(27,67,50,0.05)]">
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 tap-highlight-transparent transition-all duration-300">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">Inicio</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1B4332] dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl px-3 py-1 tap-highlight-transparent transition-all duration-300">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">Explorar</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 tap-highlight-transparent transition-all duration-300">
<span class="material-symbols-outlined" data-icon="shopping_basket">shopping_basket</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">Carrito</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 tap-highlight-transparent transition-all duration-300">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">Cuenta</span>
</div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const API_BASE = '';
    const placeholderImage = 'https://images.unsplash.com/photo-1514516870921-24d7d008a727?auto=format&fit=crop&w=1000&q=80';
    const cartCount = document.getElementById('cartCount');
    const cartButton = document.getElementById('cartButton');
    const status = document.getElementById('productosStatus');
    const productosGrid = document.getElementById('productosGrid');
    const formatter = new Intl.NumberFormat('es-CL', {
      style: 'currency',
      currency: 'CLP',
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    });

    let productosLocales = [];
    let carritoLocal = [];

    function formatearPrecio(valor) {
      return formatter.format(Number(valor) || 0);
    }

    function agruparPorCategoria(productos) {
      return productos.reduce((acc, producto) => {
        const categoria = producto.categoria?.trim() || 'Otros';
        if (!acc[categoria]) acc[categoria] = [];
        acc[categoria].push(producto);
        return acc;
      }, {});
    }

    function actualizarContadorCarrito() {
      if (!cartCount) return;
      const total = carritoLocal.reduce((sum, item) => sum + item.cantidad, 0);
      cartCount.textContent = total;
      cartCount.classList.toggle('opacity-40', total === 0);
    }

    function crearProductoCard(producto) {
      const imagenUrl = producto.imagen_url ? `{{ url_for('static', filename='') }}${producto.imagen_url}` : placeholderImage;
      const agotado = producto.stock <= 0;
      return `
        <article class="card-premium overflow-hidden bg-white rounded-3xl shadow-[0_20px_60px_rgba(45,106,79,0.12)] transition-transform duration-300 hover:-translate-y-1">
          <div class="aspect-[4/3] overflow-hidden bg-surface-container-low">
            <img
              class="w-full h-full object-cover object-center transition-transform duration-500 group-hover:scale-105"
              src="${imagenUrl}"
              alt="${producto.nombre}"
              onerror="this.src='${placeholderImage}'"
            />
          </div>
          <div class="p-6 space-y-4">
            <div class="flex items-center justify-between gap-3">
              <span class="font-label-sm text-white bg-primary px-3 py-1 rounded-full">${producto.categoria || 'Sin categoría'}</span>
              <span class="stock-label font-label-sm ${agotado ? 'text-red-600' : 'text-slate-500'}">${agotado ? 'Agotado' : `Stock ${producto.stock}`}</span>
            </div>
            <h3 class="font-headline-md text-body-lg text-tertiary">${producto.nombre}</h3>
            <p class="font-headline-md text-primary text-headline-md">${formatearPrecio(producto.precio)}</p>
            <button
              type="button"
              class="btn-agregar inline-flex w-full items-center justify-center rounded-2xl border border-primary bg-white px-4 py-3 text-sm font-semibold text-primary transition hover:bg-primary hover:text-white ${agotado ? 'cursor-not-allowed opacity-50' : ''}"
              data-product-id="${producto.id}"
              ${agotado ? 'disabled' : ''}
            >
              ${agotado ? 'Agotado' : 'Agregar'}
            </button>
          </div>
        </article>
      `;
    }

    function actualizarProductoEnDOM(productoId) {
      const producto = productosLocales.find(p => Number(p.id) === Number(productoId));
      const button = productosGrid.querySelector(`button.btn-agregar[data-product-id="${productoId}"]`);
      const stockLabel = button?.closest('article')?.querySelector('.stock-label');
      if (!button) return;
      if (!producto || producto.stock <= 0) {
        button.disabled = true;
        button.textContent = 'Agotado';
        button.classList.add('cursor-not-allowed', 'opacity-50');
        if (stockLabel) stockLabel.textContent = 'Agotado';
        return;
      }
      button.disabled = false;
      button.textContent = 'Agregar';
      button.classList.remove('cursor-not-allowed', 'opacity-50');
      if (stockLabel) stockLabel.textContent = `Stock ${producto.stock}`;
    }

    function bindAgregarButtons() {
      productosGrid.querySelectorAll('.btn-agregar').forEach(button => {
        button.addEventListener('click', async (event) => {
          event.preventDefault();
          const productId = Number(button.dataset.productId);
          const producto = productosLocales.find(p => Number(p.id) === Number(productId));
          if (!producto || producto.stock <= 0) {
            actualizarProductoEnDOM(productId);
            return;
          }

          button.disabled = true;
          try {
            const response = await fetch(`${API_BASE}/api/carrito/add`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id: productId, cantidad: 1 })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'No se pudo agregar el producto al carrito.');

            producto.stock -= 1;
            const item = carritoLocal.find(i => Number(i.id) === Number(productId));
            if (item) {
              item.cantidad += 1;
            } else {
              carritoLocal.push({
                id: producto.id,
                nombre: producto.nombre,
                precio: producto.precio,
                cantidad: 1
              });
            }

            actualizarContadorCarrito();
            actualizarProductoEnDOM(productId);
            if (cartButton) {
              cartButton.classList.add('scale-110');
              setTimeout(() => cartButton.classList.remove('scale-110'), 200);
            }
          } catch (error) {
            console.error('Error al añadir al carrito:', error);
          } finally {
            button.disabled = false;
          }
        });
      });
    }

    function renderizarCatalogo(productos) {
      productosLocales = productos.map(producto => ({
        ...producto,
        stock: Number(producto.stock) || 0,
        precio: Number(producto.precio) || 0
      }));

      if (!productosLocales.length) {
        productosGrid.innerHTML = `
          <div class="rounded-3xl border border-dashed border-slate-300 bg-white/80 p-10 text-center text-slate-500">
            No hay productos cargados en la base de datos.
          </div>
        `;
        return;
      }

      const categorias = agruparPorCategoria(productosLocales);
      productosGrid.innerHTML = Object.entries(categorias).map(([categoria, items]) => `
        <section class="mb-section-gap">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-gutter">
            <div>
              <h2 class="font-headline-md text-headline-md text-primary">${categoria}</h2>
              <p class="font-body-md text-slate-500">${items.length} producto${items.length === 1 ? '' : 's'} disponible${items.length === 1 ? '' : 's'}</p>
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-gutter">
            ${items.map(crearProductoCard).join('')}
          </div>
        </section>
      `).join('');

      bindAgregarButtons();
    }

    async function cargarProductos() {
      if (!productosGrid) return;
      try {
        status.textContent = 'Cargando productos...';
        const response = await fetch(`${API_BASE}/api/productos`);
        if (!response.ok) throw new Error(`Error ${response.status}`);
        const productos = await response.json();

        renderizarCatalogo(productos);
        status.textContent = `Mostrando ${productos.length} productos`;
      } catch (error) {
        console.error('Error al cargar productos:', error);
        productosGrid.innerHTML = `
          <div class="rounded-3xl border border-red-200 bg-red-50 p-10 text-center text-red-700">
            Error al cargar los productos. Recarga la página o verifica el servidor.
          </div>
        `;
        if (status) status.textContent = 'Error cargando productos.';
      }
    }

    cargarProductos();
  });
</script>
</body></html>
